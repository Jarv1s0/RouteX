name: Auto Build

on:
  push:
    branches:
      - develop
      - tauri-develop
  workflow_dispatch:

concurrency:
  group: autobuild-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VERSION: ''
  STORE_PATH: ''

jobs:
  update-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.build-meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - name: Read Build Metadata
        id: build-meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH_SLUG=$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')
          RELEASE_TAG="autobuild"
          RELEASE_LABEL="Autobuild"

          if [ "${GITHUB_REF_NAME}" = "tauri-develop" ]; then
            RELEASE_TAG="autobuild-tauri-develop"
            RELEASE_LABEL="Autobuild tauri Develop"
          elif [ "${GITHUB_REF_NAME}" != "develop" ]; then
            RELEASE_TAG="autobuild-${BRANCH_SLUG}"
            RELEASE_LABEL="Autobuild ${GITHUB_REF_NAME}"
          fi

          SHORT_HASH=$(git rev-parse --short HEAD)
          RELEASE_TITLE="RouteX v${VERSION} (${RELEASE_LABEL} ${SHORT_HASH})"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release_notes.md

      - name: Update Tag and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Delete existing release and tag if they exist
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          git push origin ":refs/tags/$RELEASE_TAG" || true

          # Wait a moment for GitHub to process the deletion
          sleep 2

          # Create new release and tag pointing to the current commit SHA
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file release_notes.md \
            --prerelease \
            --target ${{ github.sha }}

  build-and-upload:
    needs: update-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5.0.0

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update

          WEBKIT_PACKAGE="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PACKAGE" >/dev/null 2>&1; then
            WEBKIT_PACKAGE="libwebkit2gtk-4.0-dev"
          fi

          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            "$WEBKIT_PACKAGE"

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release-notes.md

      - name: Build Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUTEX_AUTO_BUILD: 'true'
        run: pnpm build

      - name: Upload Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          files=()
          if [ ! -d src-tauri/target/release/bundle ]; then
            echo "Artifact directory not found: src-tauri/target/release/bundle"
            exit 1
          fi

          case "${{ matrix.platform }}" in
            windows)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' \) -print0)
              ;;
            linux)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -print0)
              ;;
            macos)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -print0)
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts found for platform: ${{ matrix.platform }}"
            exit 1
          fi

          gh release upload "${{ needs.update-tag.outputs.release_tag }}" "${files[@]}" --clobber
