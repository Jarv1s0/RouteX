name: Auto Build

on:
  push:
    branches:
      - develop
      - codex/tauri-migration
  workflow_dispatch:

concurrency:
  group: autobuild-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VERSION: ""
  STORE_PATH: ""

jobs:
  update-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.build-meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - name: Read Build Metadata
        id: build-meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH_SLUG=$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')
          RELEASE_TAG="autobuild"
          RELEASE_LABEL="Autobuild"

          if [ "${GITHUB_REF_NAME}" != "develop" ]; then
            RELEASE_TAG="autobuild-${BRANCH_SLUG}"
            RELEASE_LABEL="Autobuild ${GITHUB_REF_NAME}"
          fi

          SHORT_HASH=$(git rev-parse --short HEAD)
          RELEASE_TITLE="RouteX v${VERSION} (${RELEASE_LABEL} ${SHORT_HASH})"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release_notes.md

      - name: Update Tag and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Delete existing release and tag if they exist
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          git push origin ":refs/tags/$RELEASE_TAG" || true
          
          # Wait a moment for GitHub to process the deletion
          sleep 2

          # Create new release and tag pointing to the current commit SHA
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file release_notes.md \
            --prerelease \
            --target ${{ github.sha }}

  build-and-upload:
    needs: update-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release-notes.md

      - name: Build Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUTEX_AUTO_BUILD: 'true'
        run: pnpm build

      - name: Upload Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=()
          if [ "${{ matrix.platform }}" == "windows" ]; then
             files=(src-tauri/target/release/bundle/**/*.msi src-tauri/target/release/bundle/**/*.exe)
          elif [ "${{ matrix.platform }}" == "linux" ]; then
             files=(src-tauri/target/release/bundle/**/*.deb src-tauri/target/release/bundle/**/*.rpm src-tauri/target/release/bundle/**/*.AppImage)
          elif [ "${{ matrix.platform }}" == "macos" ]; then
             files=(src-tauri/target/release/bundle/**/*.dmg src-tauri/target/release/bundle/**/*.app.tar.gz)
          fi

          if [ "${#files[@]}" -gt 0 ]; then
             gh release upload "${{ needs.update-tag.outputs.release_tag }}" "${files[@]}" --clobber
          fi

