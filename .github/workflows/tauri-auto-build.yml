name: Tauri Auto Build

on:
  push:
    branches:
      - develop
      - tauri-develop
  workflow_dispatch:

concurrency:
  group: tauri-autobuild-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VERSION: ''
  STORE_PATH: ''

jobs:
  update-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.build-meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - name: Read Build Metadata
        id: build-meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_HASH=$(git rev-parse --short HEAD)
          RELEASE_TAG="autobuild-${GITHUB_REF_NAME}"
          RELEASE_TITLE="RouteX v${VERSION} (Autobuild ${GITHUB_REF_NAME} ${SHORT_HASH})"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release_notes.md

      - name: Update Tag and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          sleep 2

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file release_notes.md \
            --prerelease \
            --target ${{ github.sha }}

  build-and-upload:
    needs: update-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5.0.0

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update

          WEBKIT_PACKAGE="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PACKAGE" >/dev/null 2>&1; then
            WEBKIT_PACKAGE="libwebkit2gtk-4.0-dev"
          fi

          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            "$WEBKIT_PACKAGE"

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Prepare Resources
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            pnpm prepare:resources -- arm64
          else
            pnpm prepare:resources
          fi

      - name: Verify Bundled Resources
        shell: bash
        run: |
          expected_files=(
            "extra/files/country.mmdb"
            "extra/files/geoip.metadb"
            "extra/files/geosite.dat"
            "extra/files/geoip.dat"
            "extra/files/ASN.mmdb"
          )

          case "${{ matrix.platform }}" in
            windows)
              expected_files+=(
                "extra/sidecar/mihomo.exe"
                "extra/files/routex-service.exe"
                "extra/files/routex-run.exe"
              )
              ;;
            linux|macos)
              expected_files+=(
                "extra/sidecar/mihomo"
                "extra/files/routex-service"
              )
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

          missing=0
          for file in "${expected_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required bundled resource: $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          printf 'Verified bundled resources:\n'
          for file in "${expected_files[@]}"; do
            du -h "$file"
          done

      - name: Typecheck
        run: pnpm typecheck

      - name: Rust Tests
        run: pnpm test:rust

      - name: Install macOS ARM64 Rust Target
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin

      - name: Build Tauri Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ROUTEX_AUTO_BUILD: 'true'
          ROUTEX_TAURI_BUILD_VARIANT: autobuild
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows)
              pnpm tauri build --bundles nsis
              ;;
            linux)
              pnpm tauri build --bundles deb rpm appimage
              ;;
            macos)
              pnpm tauri build --target aarch64-apple-darwin --bundles app,dmg
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

      - name: Prepare Release Artifacts
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="release-artifacts"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"
          version=$(node -p "require('./package.json').version")
          artifact_prefix="RouteX-${version}"

          case "${{ matrix.platform }}" in
            windows)
              bundle_dir="src-tauri/target/release/bundle"
              setup_file=$(find "$bundle_dir/nsis" -type f -name '*.exe' -print -quit)
              if [ -z "$setup_file" ]; then
                echo "Missing Windows NSIS setup artifact"
                exit 1
              fi
              cp "$setup_file" "$artifact_dir/${artifact_prefix}-windows-x64-setup.exe"

              portable_dir="$artifact_dir/RouteX-portable"
              mkdir -p "$portable_dir"
              cp src-tauri/target/release/routex_tauri.exe "$portable_dir/RouteX.exe"
              for dir in extra resources; do
                if [ ! -d "src-tauri/target/release/$dir" ]; then
                  echo "Missing Windows portable resources: src-tauri/target/release/$dir"
                  exit 1
                fi
                cp -R "src-tauri/target/release/$dir" "$portable_dir/$dir"
              done

              if command -v 7z >/dev/null 2>&1; then
                seven_zip="7z"
              elif [ -x "/c/Program Files/7-Zip/7z.exe" ]; then
                seven_zip="/c/Program Files/7-Zip/7z.exe"
              else
                echo "7-Zip is required to create ${artifact_prefix}-windows-x64-portable.7z"
                exit 1
              fi
              (cd "$portable_dir" && "$seven_zip" a -t7z "../${artifact_prefix}-windows-x64-portable.7z" .)
              rm -rf "$portable_dir"
              ;;
            linux)
              bundle_dir="src-tauri/target/release/bundle"
              deb_file=$(find "$bundle_dir/deb" -type f -name '*.deb' -print -quit)
              rpm_file=$(find "$bundle_dir/rpm" -type f -name '*.rpm' -print -quit)
              appimage_file=$(find "$bundle_dir/appimage" -type f -name '*.AppImage' -print -quit)

              if [ -z "$deb_file" ] || [ -z "$rpm_file" ] || [ -z "$appimage_file" ]; then
                echo "Missing one or more Linux artifacts"
                exit 1
              fi

              cp "$deb_file" "$artifact_dir/${artifact_prefix}-linux-amd64.deb"
              cp "$appimage_file" "$artifact_dir/${artifact_prefix}-linux-x86_64.AppImage"
              cp "$rpm_file" "$artifact_dir/${artifact_prefix}-linux-x86_64.rpm"
              ;;
            macos)
              bundle_dirs=()
              for candidate in \
                "src-tauri/target/aarch64-apple-darwin/release/bundle" \
                "src-tauri/target/release/bundle"
              do
                if [ -d "$candidate" ]; then
                  bundle_dirs+=("$candidate")
                fi
              done

              if [ "${#bundle_dirs[@]}" -eq 0 ]; then
                echo "Missing macOS bundle directory"
                find src-tauri/target -maxdepth 5 -print | sort || true
                exit 1
              fi

              dmg_file=$(find "${bundle_dirs[@]}" -type f -name '*.dmg' -print -quit)
              app_file=$(find "${bundle_dirs[@]}" -type d -name '*.app' -print -quit)

              if [ -z "$dmg_file" ] || [ -z "$app_file" ]; then
                echo "Missing one or more macOS artifacts"
                echo "dmg_file=${dmg_file:-<missing>}"
                echo "app_file=${app_file:-<missing>}"
                find "${bundle_dirs[@]}" -maxdepth 5 -print | sort
                exit 1
              fi

              cp "$dmg_file" "$artifact_dir/${artifact_prefix}-macos-arm64.dmg"
              xcrun productbuild --component "$app_file" /Applications "$artifact_dir/${artifact_prefix}-macos-arm64.pkg"
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

          expected_files=()
          case "${{ matrix.platform }}" in
            windows)
              expected_files=("${artifact_prefix}-windows-x64-portable.7z" "${artifact_prefix}-windows-x64-setup.exe")
              ;;
            linux)
              expected_files=("${artifact_prefix}-linux-amd64.deb" "${artifact_prefix}-linux-x86_64.AppImage" "${artifact_prefix}-linux-x86_64.rpm")
              ;;
            macos)
              expected_files=("${artifact_prefix}-macos-arm64.dmg" "${artifact_prefix}-macos-arm64.pkg")
              ;;
          esac

          for file in "${expected_files[@]}"; do
            if [ ! -f "$artifact_dir/$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

          find "$artifact_dir" -maxdepth 1 -type f -print | sort

      - name: Upload Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find release-artifacts -maxdepth 1 -type f -print | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found for platform: ${{ matrix.platform }}"
            exit 1
          fi

          gh release upload "${{ needs.update-tag.outputs.release_tag }}" "${files[@]}" --clobber
