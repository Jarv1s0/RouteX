name: Manual Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean
      platforms:
        description: 'Platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos

env:
  VERSION: ''
  STORE_PATH: ''
  SHORT_COMMIT: ''

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '20'

      - name: Read Version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update

          WEBKIT_PACKAGE="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PACKAGE" >/dev/null 2>&1; then
            WEBKIT_PACKAGE="libwebkit2gtk-4.0-dev"
          fi

          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            "$WEBKIT_PACKAGE"

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Rust Tests
        run: pnpm test:rust

      - name: Generate Release Notes
        run: node scripts/extract-latest-changelog.mjs changelog.md release-notes.md

      - name: Set SHORT_COMMIT
        shell: bash
        run: |
          echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and Publish Windows
        if: matrix.platform == 'windows' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows')
        run: pnpm build:win
        env:
          SHORT_COMMIT: ${{ env.SHORT_COMMIT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Build and Publish Linux
        if: matrix.platform == 'linux' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux')
        run: pnpm build:linux
        env:
          SHORT_COMMIT: ${{ env.SHORT_COMMIT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Build and Publish macOS
        if: matrix.platform == 'macos' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos')
        run: pnpm build:mac
        env:
          SHORT_COMMIT: ${{ env.SHORT_COMMIT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Upload Release Artifacts
        if: (matrix.platform == 'windows' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows')) || (matrix.platform == 'linux' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux')) || (matrix.platform == 'macos' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos'))
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          RELEASE_TAG="v${VERSION}"
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" \
            --title "RouteX v${VERSION}" \
            --notes-file release-notes.md \
            --draft \
            --target "${GITHUB_SHA}" || true

          files=()
          if [ ! -d src-tauri/target/release/bundle ]; then
            echo "Artifact directory not found: src-tauri/target/release/bundle"
            exit 1
          fi

          case "${{ matrix.platform }}" in
            windows)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' \) -print0)
              ;;
            linux)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -print0)
              ;;
            macos)
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -print0)
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts found for platform: ${{ matrix.platform }}"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '20'

      - name: Read Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate Release Notes
        shell: bash
        run: |
          node scripts/extract-latest-changelog.mjs changelog.md release_notes.md

      - name: Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit v${{ env.VERSION }} \
            --title "RouteX v${{ env.VERSION }}" \
            --notes-file release_notes.md \
            --draft=false
