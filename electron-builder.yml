appId: routex.app
productName: RouteX
directories:
  buildResources: build
asar: true
asarUnpack:
  - "**/*.node"
  - "**/extra/**"
compression: maximum
files:
  - 'out/**'
  - 'package.json'
  - '!**/*.map'
  - '!**/*.md'
  - '!**/LICENSE*'
  - '!**/*.d.ts'
  - '!node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!node_modules/*/{docs,doc,website,.github,.vscode}'
  - '!node_modules/*.d.ts'
  - '!node_modules/.bin'
extraResources:
  - from: './extra/'
    to: ''
  - from: './resources/icon.icns'
    to: 'icons/icon.icns'
  - from: './resources/icon.ico'
    to: 'icons/icon.ico'
  - from: './resources/icon.png'
    to: 'icons/icon.png'
  - from: './resources/iconTemplate.png'
    to: 'icons/iconTemplate.png'
  - from: './resources/icon_proxy.ico'
    to: 'icons/icon_proxy.ico'
  - from: './resources/icon_tun.ico'
    to: 'icons/icon_tun.ico'
  - from: './resources/subStoreIcon.png'
    to: 'icons/subStoreIcon.png'
protocols:
  name: 'RouteX URI Scheme'
  schemes:
    - 'clash'
    - 'mihomo'
    - 'routex'

# 全局默认命名规则
artifactName: RouteX-${version}-${os}-${arch}.${ext}

win:
  icon: resources/icon.ico
  target:
    - nsis
    - 7z
  # Windows 专属命名
  artifactName: RouteX-${version}-windows-${arch}-portable.${ext}
nsis:
  artifactName: RouteX-${version}-windows-${arch}-setup.${ext}
  uninstallDisplayName: ${productName}
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  installerIcon: resources/installerIcon.ico
  uninstallerIcon: resources/installerIcon.ico
  installerHeader: resources/installerHeader.bmp
  installerSidebar: resources/installerSidebar.bmp
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
mac:
  icon: resources/icon.icns
  target:
    - pkg
    - dmg
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  artifactName: RouteX-${version}-macos-${arch}.${ext}
pkg:
  allowAnywhere: false
  allowCurrentUserHome: false
linux:
  icon: resources/icon.png
  desktop:
    entry:
      Name: RouteX
      MimeType: 'x-scheme-handler/clash;x-scheme-handler/mihomo;x-scheme-handler/routex'
  target:
    - deb
    - rpm
    - AppImage
  maintainer: Jarv1s0
  category: Utility
  artifactName: RouteX-${version}-linux-${arch}.${ext}
deb:
  afterInstall: 'build/linux/postinst'
rpm:
  afterInstall: 'build/linux/postinst'
npmRebuild: true
releaseInfo:
  releaseNotesFile: release-notes.md
publish:
  provider: github
  owner: Jarv1s0
  repo: RouteX
